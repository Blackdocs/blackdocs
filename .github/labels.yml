# Issue Type
- name: 'bug'
  color: '#d73a4a'
  description: "Something isn't working as expected"
- name: 'feature request'
  color: '#a2eeef'
  description: 'New feature or enhancement request'
- name: 'discussion'
  color: '#d876e3'
  description: 'Needs broader discussion'

# Status
- name: 'in progress'
  color: '#fbca04'
  description: 'Actively being worked on'
- name: 'in review'
  color: '#0075ca'
  description: 'Open for code review'
- name: 'approved'
  color: '#11ea91'
  description: 'Approved by a maintainer'
- name: 'merge ready'
  color: '#0e8a16'
  description: 'Approved and ready to merge'
- name: 'blocked'
  color: '#d13917'
  description: 'Blocked by an unresolved dependency'
- name: 'waiting for response'
  color: '#be4422'
  description: 'Waiting on the author or reporter'
- name: 'waiting for testers'
  color: '#7d006a'
  description: 'Needs community testing'
- name: 'stale'
  color: '#bfd4f2'
  description: 'No recent activity; may be closed soon'

# Priority
- name: 'priority: low'
  color: '#c5def5'
  description: 'Low urgency; nice to have'
- name: 'priority: medium'
  color: '#ffd33d'
  description: 'Should be addressed in the near term'
- name: 'priority: high'
  color: '#d73a4a'
  description: 'Urgent; needs prompt attention'

# Resolution
- name: 'duplicate'
  color: '#cfd3d7'
  description: 'This issue or PR already exists'
- name: 'invalid'
  color: '#e4e669'
  description: 'Not valid or not actionable'
- name: 'wontfix'
  color: '#ffffff'
  description: 'This will not be worked on'
- name: 'works as intended'
  color: '#c8e6c9'
  description: 'Behavior is correct; not a bug'

# Help & Community
- name: 'good first issue'
  color: '#7057ff'
  description: 'Good for newcomers to the project'
- name: 'help wanted'
  color: '#008672'
  description: 'Extra attention or community help needed'

# Type of Change
- name: 'breaking change'
  color: '#e9314a'
  description: 'Breaks backward compatibility in the public API'
- name: 'api changes'
  color: '#5319e7'
  description: 'Changes to the public package API surface'
- name: 'dependencies'
  color: '#0366d6'
  description: 'Dependency additions, updates, or removals'
- name: 'security'
  color: '#ee0701'
  description: 'Security vulnerability or hardening'
- name: 'performance'
  color: '#ff6b6b'
  description: 'Performance improvements or regressions'
- name: 'accessibility'
  color: '#1d76db'
  description: 'Accessibility improvements or fixes'
- name: 'typings'
  color: '#1d76db'
  description: 'TypeScript type definitions or changes'
- name: 'interactions'
  color: '#c5def5'
  description: 'Component interaction and event handling behavior'
- name: 'error handling'
  color: '#f9d0c4'
  description: 'Error handling improvements or fixes'

# Code & Build
- name: 'tests'
  color: '#bfd4f2'
  description: 'Test additions, changes, or coverage'
- name: 'build'
  color: '#0075ca'
  description: 'Build system or tooling configuration'
- name: 'ci'
  color: '#0366d6'
  description: 'CI/CD pipeline configuration or fixes'
- name: 'styles'
  color: '#ffc0cb'
  description: 'Visual styles, CSS, or Tailwind changes'
- name: 'refactor'
  color: '#d4c5f9'
  description: 'Code refactoring without behavior change'
- name: 'chore'
  color: '#fef2c0'
  description: 'Maintenance, cleanup, or housekeeping'
- name: 'utility'
  color: '#ededed'
  description: 'Utility functions, hooks, or helpers'

# Docs & Release
- name: 'docs'
  color: '#0075ca'
  description: 'Documentation additions or improvements'
- name: 'released'
  color: '#0e8a16'
  description: 'Included in a published release'

# Review Quality
- name: 'AI pr'
  color: '#b60205'
  description: 'AI-assisted PR; review very carefully'
- name: 'bad pr'
  color: '#b60205'
  description: 'Does not meet project standards'

# Automation
- name: 'automation'
  color: '#0366d6'
  description: 'Changes done by automated tools or bots'

# Packages
- name: 'packages:core'
  color: '#5663e9'
  description: 'Affects the @blackdocs/core package'
- name: 'packages:ui'
  color: '#7c68ee'
  description: 'Affects the @blackdocs/ui package'
- name: 'packages:typescript'
  color: '#ab97d6'
  description: 'Affects the @blackdocs/typescript package'
- name: 'packages:tsconfig'
  color: '#c3b6e3'
  description: 'Affects the tsconfig package'

# Apps
- name: 'apps:docs'
  color: '#1d76db'
  description: 'Affects the docs application'
- name: 'apps:web'
  color: '#2683e8'
  description: 'Affects the web application'
- name: 'apps:template'
  color: '#3390f0'
  description: 'Affects the template application'

# Tools
- name: 'tools:eslint'
  color: '#0e8a6e'
  description: 'Affects the ESLint configuration package'
- name: 'tools:vitest'
  color: '#1a9e7e'
  description: 'Affects the Vitest configuration package'
